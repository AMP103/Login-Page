<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Login and Registration MBRI Library by AP</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..7,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#135bec",
              "background-light": "#f6f6f8",
              "background-dark": "#101622",
            },
            fontFamily: {
              display: ["Inter", "sans-serif"],
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
          },
        },
      }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex items-center justify-center font-display">
    <div class="flex flex-row min-h-screen w-full max-w-7xl">

        <!-- Left side: Image -->
        <div class="hidden lg:flex lg:w-1/2 p-12 bg-cover bg-center" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBUkKZ-l3Eh6DB8AeUGsjT0r4iwr2Pv1rKxfK7mMfICPj8kUmSNkvFMF4_IJGUIu_lZbf0jjIgTEaVjXUYYAngeLshyYK24DDlnUH6ZbW9QLsCASh48nUHeNkbkEkPABjRa3fbfKgxvZdGfSPC3mKdpypaL-3q_u_zOUMUZME-mQ4VG2G-9h5_ON_xKikdWpiD0iRYahIJ9tQGedXxSHmnsIZfntR8M1aT94nDrJbGKVVt3wiDcggKirXyi18OOV57l5NUy5qHyYQ');">
        </div>

        <!-- Right side: Forms -->
        <div class="flex flex-col justify-center p-6 lg:w-1/2">

            <!-- Branding -->
            <div class="mb-10">
                <span class="material-symbols-outlined text-primary text-3xl">auto_stories</span>
                <h2 class="text-2xl font-bold tracking-tight">MBRI Library</h2>
            </div>

            <!-- Welcome message -->
            <div class="mb-6">
                <h1 class="text-5xl font-bold leading-tight mb-6">Your Gateway to Knowledge</h1>
                <p class="text-lg text-slate-200 leading-relaxed">Access thousands of books, academic journals, and premium digital resources from anywhere in the world.</p>
            </div>

            <!-- Tabs Switcher -->
            <div class="flex p-1 bg-slate-100 dark:bg-slate-800 rounded-xl mb-8">
                <button id="tab-login" class="flex-1 py-2.5 text-sm font-semibold rounded-lg bg-white dark:bg-slate-700 text-slate-900 shadow-sm ring-1 ring-slate-200 dark:ring-slate-600 transition-all" type="button">
                    Login
                </button>
                <button id="tab-signup" class="flex-1 py-2.5 text-sm font-semibold rounded-lg text-slate-500 dark:text-slate-200 hover:text-slate-700 dark:hover:text-slate-200 transition-all">
                    Sign Up
                </button>
            </div>

            <!-- Login Form Content -->
            <form id="form-login" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5" for="login-email">Email or Library ID</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">mail</span>
                        <input class="block w-full pl-10 pr-4 py-3 rounded-lg border border-slate-300 dark:border-slate-700 rounded-lg text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-all" id="login-email" name="email" placeholder="name@example.com" type="text" required/>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5" for="login-password">Password</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">lock</span>
                        <input class="password-input block w-full pl-10 pr-4 py-3 rounded-lg border border-slate-300 dark:border-slate-700 rounded-lg text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-all" id="login-password" name="password" placeholder="••••••••" type="password" required/>
                        <button class="password-toggle absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition-colors" type="button"><span class="material-symbols-outlined">visibility</span></button>
                    </div>
                </div>

                <button class="w-full py-3.5 bg-primary hover:bg-primary/90 text-white font-bold rounded-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2" type="submit">
                    Sign In
                </button>
            </form>

            <!-- Sign Up Form Content -->
            <form id="form-signup" class="space-y-6 hidden">
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5" for="signup-name">Full Name</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">person</span>
                        <input class="block w-full pl-10 pr-4 py-3 rounded-lg border border-slate-300 dark:border-slate-700 rounded-lg text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-all" id="signup-name" name="name" placeholder="John Doe" type="text" required/>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5" for="signup-email">Email Address</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">mail</span>
                        <input class="block w-full pl-10 pr-4 py-3 rounded-lg border border-slate-300 dark:border-slate-700 rounded-lg text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-all" id="signup-email" name="email" placeholder="name@example.com" type="email" required/>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5" for="signup-password">Create Password</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">lock</span>
                        <input class="password-input block w-full pl-10 pr-4 py-3 rounded-lg border border-slate-300 dark:border-slate-700 rounded-lg text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-all" id="signup-password" name="password" placeholder="••••••••" type="password" required/>
                        <button class="password-toggle absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition-colors" type="button"><span class="material-symbols-outlined">visibility</span></button>
                    </div>
                </div>

                <button class="w-full py-3.5 bg-primary hover:bg-primary/90 text-white font-bold rounded-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2" type="submit">
                    Create Account
                </button>
            </form>

            <!-- Footer Links -->
            <div class="mt-10 border-t border-slate-100 dark:border-slate-800 pt-8">
                <p class="text-center text-sm text-slate-500 dark:text-slate-400">
                    Don't have a library card?<br/>
                    <a class="text-primary font-bold hover:underline" href="#">Apply online now</a>
                </p>
                <div class="flex justify-center gap-6 mt-6">
                    <a class="text-slate-400 font-medium hover:text-primary transition-colors" href="#"><span class="material-symbols-outlined">terms</span></a>
                    <a class="text-slate-400 font-medium hover:text-primary transition-colors" href="#"><span class="material-symbols-outlined">privacy_policy</span></a>
                    <a class="text-slate-400 font-medium hover:text-primary transition-colors" href="#"><span class="material-symbols-outlined">how_to_reg</span></a>
                </div>
            </div>

        </div>

    </div>

<script src="script.js"></script>
</body>
</html>
